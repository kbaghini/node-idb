<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title description">
  <title id="title">node-idb core and Studio overview</title>
  <desc id="description">One node-idb package provides a document database API and a local browser Studio, both operating on local SQLite storage.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="studio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="960" height="280" rx="24" fill="url(#background)"/>
  <text x="480" y="43" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">one install · two entry points · local SQLite files</text>
  <g filter="url(#shadow)">
    <rect x="55" y="75" width="270" height="145" rx="18" fill="url(#core)"/>
    <rect x="635" y="75" width="270" height="145" rx="18" fill="url(#studio)"/>
    <rect x="376" y="99" width="208" height="97" rx="18" fill="#f8fafc"/>
  </g>
  <text x="190" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="750">Core API</text>
  <text x="190" y="150" text-anchor="middle" fill="#ecfdf5" font-family="ui-monospace, monospace" font-size="16">node-idb</text>
  <text x="190" y="181" text-anchor="middle" fill="#ecfdf5" font-family="system-ui, sans-serif" font-size="15">store · query · index · backup</text>
  <text x="770" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="750">Browser Studio</text>
  <text x="770" y="150" text-anchor="middle" fill="#eff6ff" font-family="ui-monospace, monospace" font-size="16">node-idb/studio</text>
  <text x="770" y="181" text-anchor="middle" fill="#eff6ff" font-family="system-ui, sans-serif" font-size="15">browse · edit · query · inspect</text>
  <text x="480" y="132" text-anchor="middle" fill="#111827" font-family="system-ui, sans-serif" font-size="21" font-weight="750">Your database</text>
  <text x="480" y="163" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="15">local, typed, durable</text>
  <path d="M325 147h45" stroke="#a7f3d0" stroke-width="5" stroke-linecap="round"/>
  <path d="M590 147h45" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
  <circle cx="350" cy="147" r="7" fill="#f8fafc"/>
  <circle cx="610" cy="147" r="7" fill="#f8fafc"/>
  <text x="480" y="252" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="14">No separate database server · Studio is loopback-only and read-only by default</text>
</svg>
